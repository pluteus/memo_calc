<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>memo_calc</title>
<meta name="theme-color" content="#ffffff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="memo_calc">
<link rel="manifest" id="pwa-manifest">
<link rel="icon" id="pwa-icon">
<link rel="apple-touch-icon" id="pwa-apple-icon">
<script>
// FOUC防止：レンダリング前にテーマを適用
(function(){
  var t = localStorage.getItem('calcpad-theme') ?? 'light';
  if (t === 'light') document.documentElement.classList.add('light');
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
:root {
  --bg: #0f1117; --surface: #161b22; --border: #2a2f3a;
  --text: #e6edf3; --dim: #5a6373;
  --cyan: #39d0d8; --green: #7ee787; --magenta: #ff6eb4;
  --yellow: #e3b341; --orange: #ff9500; --purple: #bc8cff;
  --red: #f85149;
  --font: 'JetBrains Mono','Fira Code','Courier New',monospace;
  --lnum-color: #3d4451;
  --result-bg: #0d1117;
  --result-num: #7ee787;
}
:root.light {
  --bg: #ffffff; --surface: #f3f4f6; --border: #d1d5db;
  --text: #1f2328; --dim: #6e7781;
  --cyan: #0969da; --green: #1a7f37; --magenta: #bf3989;
  --yellow: #9a6700; --orange: #bc4c00; --purple: #6639ba;
  --red: #d1242f;
  --lnum-color: #b0b8c4;
  --result-bg: #f6f8fa;
  --result-num: #0000FF;
}
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px;
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
  /* ブラウザのピンチズームを無効化 */
  touch-action: none;
}
#hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  touch-action: manipulation;
}
#hdr h1 { color: var(--cyan); font-size: 15px; letter-spacing: .06em; }
.badge { font-size: 10px; border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; color: var(--dim); }
#hdr-right { margin-left: auto; display: flex; gap: 6px; }
.hbtn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--dim); font-size: 12px; padding: 3px 10px;
  cursor: pointer; font-family: var(--font); touch-action: manipulation;
}
.hbtn:hover { color: var(--cyan); border-color: var(--cyan); }

#main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* Line numbers */
#lnums {
  width: 40px; background: var(--surface);
  border-right: 1px solid var(--border);
  overflow: hidden; flex-shrink: 0;
  padding-top: 10px; user-select: none;
}
.lnum { text-align: right; padding-right: 8px; color: var(--lnum-color); }
.lnum.cur { color: var(--cyan); }

/* Editor */
#editor-wrap { flex: 1; position: relative; overflow: hidden; min-width: 0; background: var(--bg); }
#hl-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
#ta {
  position: absolute; inset: 0;
  background: transparent; color: transparent; caret-color: var(--cyan);
  font-family: var(--font);
  padding: 10px 8px;
  border: none; outline: none; resize: none;
  z-index: 2; white-space: pre;
  overflow: auto;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  touch-action: pan-x pan-y;
}

/* Divider */
#divider {
  width: 14px; background: var(--border);
  cursor: col-resize; flex-shrink: 0;
  position: relative; z-index: 10;
  transition: background 0.15s;
  touch-action: none;
}
#divider:hover, #divider.dragging { background: var(--cyan); }
#divider::after {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 4px; height: 36px; border-radius: 3px;
  background: rgba(255,255,255,0.25);
}

/* Results */
#results {
  border-left: none; overflow: hidden; background: var(--result-bg);
  padding-top: 10px; flex-shrink: 0;
}
.rcell {
  padding: 0 10px; text-align: right;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Footer */
#footer {
  display: flex; align-items: center; gap: 12px;
  padding: 4px 14px; background: var(--surface);
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--dim); flex-shrink: 0;
  touch-action: manipulation;
}
#status-sum { color: var(--cyan); }
#btn-fs.active { color: var(--cyan); border-color: var(--cyan); background: #0e2f33; }
#btn-numpad.active { color: var(--cyan); border-color: var(--cyan); }

/* テンキー */
#numpad {
  display: none; flex-shrink: 0; background: var(--surface);
  border-top: 1px solid var(--border);
  grid-template-columns: repeat(4, 1fr);
  gap: 1px; padding: 1px;
  touch-action: manipulation;
}
#numpad.open { display: grid; }
.npkey {
  background: var(--bg); color: var(--text);
  border: none; font-family: var(--font);
  font-size: 18px; padding: 12px 0;
  -webkit-user-select: none; user-select: none;
}
.npkey:active { background: var(--border); }
.npkey.op     { color: var(--cyan); }
.npkey.wide   { grid-column: span 2; }
.npkey.accent { background: var(--cyan); color: #fff; font-weight: bold; }
.lnum { cursor: pointer; }
.lnum:hover { color: var(--cyan) !important; background: rgba(57,208,216,0.08); }

/* Help */
#help-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.72);
  align-items: center; justify-content: center; z-index: 100;
  touch-action: manipulation;
}
#help-overlay.open { display: flex; }
#help-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 28px;
  max-width: 440px; width: 90%;
  font-size: 13px; line-height: 1.8;
}
#help-box h2 { color: var(--cyan); font-size: 15px; margin-bottom: 12px; }
.help-sec-title { color: var(--yellow); font-size: 11px; margin-top: 10px; margin-bottom: 3px; }
.help-code {
  display: inline-block; background: var(--result-bg); color: var(--green);
  border-radius: 4px; padding: 1px 6px; margin: 2px 4px 2px 0; font-size: 12px;
  font-family: var(--font);
}
#help-close {
  margin-top: 16px; background: var(--cyan); color: #0f1117;
  border: none; border-radius: 6px; padding: 6px 20px;
  cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--font);
  touch-action: manipulation;
}
</style>
</head>
<body>

<div id="hdr">
  <h1>memo_calc</h1>
  <button class="hbtn" id="btn-save" title="テキストファイルとして保存" style="padding:3px 8px;font-size:14px;line-height:1;">💾</button>
  <button class="hbtn" id="btn-load" title="テキストファイルを読み込み" style="padding:3px 8px;font-size:14px;line-height:1;">📂</button>
  <input type="file" id="file-load" accept=".txt,text/plain" style="display:none;">
  <span class="badge">β</span>
  <div id="hdr-right">
    <button class="hbtn" id="btn-clear">クリア</button>
    <button class="hbtn" id="btn-help">使い方</button>
    <button class="hbtn" id="btn-theme" title="テーマ切替" style="padding:3px 8px;font-size:14px;line-height:1;">☀</button>
    <button class="hbtn" id="btn-fs" title="フルスクリーン" style="padding:3px 8px;font-size:14px;line-height:1;">⛶</button>
  </div>
</div>

<div id="main">
  <div id="lnums"></div>
  <div id="editor-wrap">
    <canvas id="hl-canvas"></canvas>
    <textarea id="ta" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
  </div>
  <div id="divider"></div>
  <div id="results"></div>
</div>

<div id="footer">
  <span>合計: <span id="status-sum">—</span></span>
  <span id="status-pos">行 1</span>
  <button class="hbtn" id="btn-dispmode" title="表示形式切替" style="margin-left:auto;padding:2px 8px;font-size:12px;font-family:var(--font);min-width:48px;text-align:center;">小数</button>
  <button class="hbtn" id="btn-numpad" title="テンキー切替" style="padding:2px 8px;font-size:12px;">🔢</button>
</div>

<div id="numpad">
  <button class="npkey" data-k="7">7</button>
  <button class="npkey" data-k="8">8</button>
  <button class="npkey" data-k="9">9</button>
  <button class="npkey op" data-k="/">/</button>
  <button class="npkey" data-k="4">4</button>
  <button class="npkey" data-k="5">5</button>
  <button class="npkey" data-k="6">6</button>
  <button class="npkey op" data-k="*">×</button>
  <button class="npkey" data-k="1">1</button>
  <button class="npkey" data-k="2">2</button>
  <button class="npkey" data-k="3">3</button>
  <button class="npkey op" data-k="-">−</button>
  <button class="npkey" data-k="0">0</button>
  <button class="npkey" data-k=".">.</button>
  <button class="npkey" data-k="%">%</button>
  <button class="npkey op" data-k="+">+</button>
  <button class="npkey op" data-k="(">(</button>
  <button class="npkey op" data-k=")">)</button>
  <button class="npkey" data-k="bs">⌫</button>
  <button class="npkey accent" data-k="enter">↵</button>
</div>

<div id="help-overlay">
  <div id="help-box">
    <h2>📐 memo_calc 使い方</h2>
    <div class="help-sec-title">基本計算</div>
    <span class="help-code">1 + 2</span><span class="help-code">100 * 0.8</span><span class="help-code">2 ^ 10</span><span class="help-code">15 % 4</span><span class="help-code">10%</span> → 0.1
    <div class="help-sec-title">行参照</div>
    <span class="help-code">S1</span><span class="help-code">S3</span> — その行の計算結果を参照
    <div class="help-sec-title">関数</div>
    <span class="help-code">sum(S1,S5)</span><span class="help-code">avg(S2,S4)</span><span class="help-code">sqrt(144)</span><span class="help-code">round(3.14,1)</span><span class="help-code">abs(-5)</span><span class="help-code">min(a,b)</span><span class="help-code">max(a,b)</span>
    <div class="help-sec-title">コメント</div>
    <span class="help-code"># これはコメント</span><span class="help-code">メモ書きもOK</span>
    数字・演算子を含まない行は自動でコメント扱いになります
    <div class="help-sec-title">ジェスチャー</div>
    ピンチイン／アウト → 文字サイズ変更<br>
    区切り線を左右ドラッグ → 幅調整
    <br>
    <button id="help-close">閉じる</button>
  </div>
</div>

<script>
const ta        = document.getElementById('ta');
const canvas    = document.getElementById('hl-canvas');
const ctx       = canvas.getContext('2d');
const lnums     = document.getElementById('lnums');
const resultsEl = document.getElementById('results');
const statusSum = document.getElementById('status-sum');
const statusPos = document.getElementById('status-pos');
const divider   = document.getElementById('divider');

/* ── 可変パラメータ ── */
let fontSize    = 14;   // px
let resultsW    = 130;  // px
const MIN_FS    = 8;
const MAX_FS    = 32;
const PAD_TOP   = 10;
const PAD_LEFT  = 8;

function lineHeight() { return Math.round(fontSize * 2.1); }
function fontStr()    { return `${fontSize}px "JetBrains Mono","Fira Code","Courier New",monospace`; }

/* ── 色 ── */
function getC() {
  const s = getComputedStyle(document.documentElement);
  const v = n => s.getPropertyValue(n).trim();
  return {
    comment: v('--dim'),  fn: v('--cyan'),   sref: v('--yellow'),
    num:     v('--green'), op: v('--magenta'), paren: v('--purple'),
    other:   v('--dim'),
  };
}

/* ── トークナイザ ── */
function getTokens(C) {
  return [
    { re:/^(sum|avg|sqrt|abs|round|min|max|floor|ceil|pi)\b/i, col:C.fn },
    { re:/^(S\d+)\b/i,    col:C.sref },
    { re:/^(\d+\.?\d*)/, col:C.num },
    { re:/^([+\-*\/\^%])/,col:C.op },
    { re:/^([()\[\]])/,  col:C.paren },
    { re:/^(\s+)/,        col:null },
    { re:/^(.)/,          col:C.other },
  ];
}

function tokenize(line) {
  const C = getC();
  const trimmed = line.trim();
  if (!trimmed || trimmed.startsWith('#') || isCommentLike(trimmed))
    return [{ text: line, col: C.comment }];
  const toks = []; let rest = line;
  for (const TOKENS = getTokens(C); rest.length;) {
    let hit = false;
    for (const { re, col } of TOKENS) {
      const m = rest.match(re);
      if (m) { toks.push({ text: m[0], col }); rest = rest.slice(m[0].length); hit = true; break; }
    }
    if (!hit) { toks.push({ text: rest[0], col: C.other }); rest = rest.slice(1); }
  }
  return toks;
}

/* ── Canvas ── */
function resizeCanvas() {
  const wrap = document.getElementById('editor-wrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function drawHighlight(lines, scrollTop, scrollLeft) {
  const LH = lineHeight();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.font = fontStr();
  ctx.textBaseline = 'middle';
  const start = Math.floor(scrollTop / LH);
  const end   = Math.min(lines.length - 1, start + Math.ceil(canvas.height / LH) + 1);
  for (let i = start; i <= end; i++) {
    const y = PAD_TOP + i * LH + LH / 2 - scrollTop;
    let x = PAD_LEFT - scrollLeft;
    for (const tok of tokenize(lines[i])) {
      if (tok.col) { ctx.fillStyle = tok.col; ctx.fillText(tok.text, x, y); }
      x += ctx.measureText(tok.text).width;
    }
  }
}

/* ── 数式評価 ── */
// 文字列のみの行（数式でない行）を判定する：演算子・関数・数字・S参照を含まない
function isCommentLike(raw) {
  // 全角文字（日本語・全角記号など）を含む行はコメント扱い
  if (/[^\x00-\x7F]/.test(raw)) return true;
  // 数字、演算子、関数名、S参照、カッコのいずれも含まなければコメント扱い
  return !/[\d+\-*\/\^%()=]/.test(raw) &&
    !/\b(sum|avg|sqrt|abs|round|min|max|floor|ceil|pi)\b/i.test(raw) &&
    !/\bS\d+\b/i.test(raw);
}

function evaluate(lines) {
  const res = [];
  for (let i = 0; i < lines.length; i++) {
    const raw = lines[i].trim();
    // 空行・#コメント・文字列のみの行はすべてempty（コメント）扱い
    if (!raw || raw.startsWith('#') || isCommentLike(raw)) { res.push({ type:'empty' }); continue; }
    try {
      // sum/avg を単体S参照展開より先に処理する
      let expr = raw;
      expr = expr.replace(/\bsum\(S(\d+),S(\d+)\)/gi,(_,a,b)=>{
        const lo=Math.min(+a,+b)-1,hi=Math.max(+a,+b)-1; let s=0;
        for(let j=lo;j<=hi;j++) if(res[j]?.type==='number') s+=res[j].value; return s;
      });
      expr = expr.replace(/\bavg\(S(\d+),S(\d+)\)/gi,(_,a,b)=>{
        const lo=Math.min(+a,+b)-1,hi=Math.max(+a,+b)-1; let s=0,c=0;
        for(let j=lo;j<=hi;j++) if(res[j]?.type==='number'){s+=res[j].value;c++;} return c?s/c:'NaN';
      });
      expr = expr.replace(/S(\d+)/gi, (_,n) => {
        const r = res[+n-1]; return r?.type==='number' ? r.value : 'NaN';
      });
      expr = expr
        .replace(/(\d+\.?\d*)%/g, '($1/100)')
        .replace(/\^/g,'**').replace(/\bsqrt\b/g,'Math.sqrt').replace(/\babs\b/g,'Math.abs')
        .replace(/\bmin\b/g,'Math.min').replace(/\bmax\b/g,'Math.max')
        .replace(/\bfloor\b/g,'Math.floor').replace(/\bceil\b/g,'Math.ceil')
        .replace(/\bpi\b/gi,'Math.PI')
        .replace(/\bround\(([^,)]+),\s*(\d+)\)/g,(_,x,d)=>`(Math.round(${x}*1e${d})/1e${d})`)
        .replace(/\bround\(([^)]+)\)/g,(_,x)=>`Math.round(${x})`);
      const val = Function('"use strict";return('+expr+')')();
      res.push(typeof val==='number'&&isFinite(val)?{type:'number',value:val}:{type:'empty'});
    } catch { res.push({type:'error'}); }
  }
  return res;
}

function fmt(n) {
  if (Math.abs(n)>=1e9||(n!==0&&Math.abs(n)<0.001)) return n.toExponential(4);
  const s=parseFloat(n.toPrecision(12)).toString(), [a,b]=s.split('.');
  return a.replace(/\B(?=(\d{3})+(?!\d))/g,','+(b?'.'+b:''));
}
// fix fmt: comma bug
/* ── 表示形式（小数／繰り下げ／繰り上げ／四捨五入） ── */
let displayMode = localStorage.getItem('calcpad-dispmode') || 'decimal';
const DISP_MODES = ['decimal','floor','ceil','round'];
const DISP_LABELS = { decimal:'小数', floor:'切捨', ceil:'切上', round:'四捨五入' };

function applyDisplayMode(n) {
  switch (displayMode) {
    case 'floor': return Math.floor(n);
    case 'ceil':  return Math.ceil(n);
    case 'round': return Math.round(n);
    default:      return n; // decimal
  }
}

function fmtN(n) {
  n = applyDisplayMode(n);
  if (Math.abs(n)>=1e9||(n!==0&&Math.abs(n)<0.001)) return n.toExponential(4);
  const s=parseFloat(n.toPrecision(12)).toString();
  const parts=s.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return parts.join('.');
}

/* ── UI更新 ── */
let curLine = 0;

function applyFontSize() {
  const LH = lineHeight();
  ta.style.fontSize    = fontSize + 'px';
  ta.style.lineHeight  = LH + 'px';
  // 行番号フォントサイズ
  document.querySelectorAll('.lnum').forEach(el => {
    el.style.height     = LH + 'px';
    el.style.lineHeight = LH + 'px';
    el.style.fontSize   = Math.max(9, fontSize - 3) + 'px';
  });
  // 結果列セルも更新
  document.querySelectorAll('.rcell').forEach(el => {
    el.style.height     = LH + 'px';
    el.style.lineHeight = LH + 'px';
    el.style.fontSize   = Math.max(9, fontSize - 1) + 'px';
  });
}

function applyResultsWidth() {
  resultsEl.style.width = resultsW + 'px';
}

function render() {
  const lines = ta.value.split('\n');
  const res   = evaluate(lines);
  const LH    = lineHeight();

  // テキストエリアのフォント・行高を常に同期（カーソルずれ防止）
  ta.style.fontSize   = fontSize + 'px';
  ta.style.lineHeight = LH + 'px';

  // 行番号
  lnums.innerHTML = lines.map((_,i) =>
    `<div class="lnum${i===curLine?' cur':''}" data-line="${i+1}" style="height:${LH}px;line-height:${LH}px;font-size:${Math.max(9,fontSize-3)}px">${i+1}</div>`
  ).join('');

  // Canvas
  resizeCanvas();
  drawHighlight(lines, ta.scrollTop, ta.scrollLeft);

  // 結果
  resultsEl.innerHTML = res.map(r => {
    const h = `height:${LH}px;line-height:${LH}px;font-size:${Math.max(9,fontSize-1)}px;`;
    if (r.type==='number') return `<div class="rcell" style="${h}color:var(--result-num)">${fmtN(r.value)}</div>`;
    if (r.type==='error')  return `<div class="rcell" style="${h}color:var(--red)">ERR</div>`;
    return `<div class="rcell" style="${h}color:transparent">·</div>`;
  }).join('');

  // 合計
  const nums = res.filter(r=>r.type==='number').map(r=>r.value);
  statusSum.textContent = nums.length ? fmtN(nums.reduce((a,b)=>a+b,0)) : '—';

  syncScroll();
}

function syncScroll() {
  const lines = ta.value.split('\n');
  lnums.scrollTop     = ta.scrollTop;
  resultsEl.scrollTop = ta.scrollTop;
  drawHighlight(lines, ta.scrollTop, ta.scrollLeft);
}

function updateCursor() {
  const pos = ta.selectionStart;
  curLine = ta.value.substring(0, pos).split('\n').length - 1;
  statusPos.textContent = `行 ${curLine+1}`;
}

/* ── ピンチズーム → 文字サイズ ── */
let pinchStartDist = null;
let pinchStartFS   = fontSize;

document.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchStartDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    pinchStartFS = fontSize;
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchStartDist !== null) {
    e.preventDefault();
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const ratio = dist / pinchStartDist;
    fontSize = Math.min(MAX_FS, Math.max(MIN_FS, Math.round(pinchStartFS * ratio)));
    render();
  }
}, { passive: false });

document.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinchStartDist = null;
}, { passive: true });

/* ── 区切り線ドラッグ ── */
let divDragging = false;
let divStartX   = 0;
let divStartW   = resultsW;

function onDivMove(clientX) {
  const mainRect = document.getElementById('main').getBoundingClientRect();
  const newW = Math.min(
    mainRect.width - 120,
    Math.max(60, mainRect.right - clientX - 7)
  );
  resultsW = newW;
  applyResultsWidth();
  resizeCanvas();
  render();
}

// Mouse
divider.addEventListener('mousedown', e => {
  divDragging = true;
  divider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (divDragging) onDivMove(e.clientX);
});
document.addEventListener('mouseup', () => {
  if (divDragging) {
    divDragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// Touch
divider.addEventListener('touchstart', e => {
  divDragging = true;
  divider.classList.add('dragging');
  e.preventDefault();
}, { passive: false });
document.addEventListener('touchmove', e => {
  if (divDragging && e.touches.length === 1) {
    onDivMove(e.touches[0].clientX);
    e.preventDefault();
  }
}, { passive: false });
document.addEventListener('touchend', () => {

});

/* ── S参照自動修正 ── */
let prevLines = [];

function fixSRefs(oldLines, newLines) {
  const oldLen = oldLines.length;
  const newLen = newLines.length;
  if (oldLen === newLen) return; // 行数変化なし → 修正不要

  const delta = newLen - oldLen; // 正=行追加、負=行削除

  // 変化点：前後から共通部分を除いた最初の変化行
  let changeAt = 0;
  for (let i = 0; i < Math.min(oldLen, newLen); i++) {
    if (oldLines[i] !== newLines[i]) { changeAt = i; break; }
    changeAt = i + 1;
  }
  // 変化点の行自体が編集中の行（その行のS参照は触らない）
  // 変化点より下の行のS参照番号をdeltaだけずらす
  const cursorPos = ta.selectionStart;
  const result = newLines.map((line, i) => {
    if (i <= changeAt) return line;
    return line.replace(/S(\d+)/gi, (match, n) => {
      const num = parseInt(n);
      return num > changeAt ? `S${num + delta}` : match;
    });
  });

  const newText = result.join('\n');
  if (newText === ta.value) return;
  ta.value = newText;
  ta.selectionStart = ta.selectionEnd = cursorPos;
}

let saveTimer = null;
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => localStorage.setItem('calcpad-note', ta.value), 300);
}

ta.addEventListener('input', () => {
  const newLines = ta.value.split('\n');
  fixSRefs(prevLines, newLines);
  prevLines = ta.value.split('\n');
  updateCursor();
  render();
  scheduleSave();
});
ta.addEventListener('keyup',  () => { updateCursor(); render(); });
ta.addEventListener('click',  () => { updateCursor(); render(); });
ta.addEventListener('scroll', syncScroll);

ta.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0,s) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 2;
    render();
  }
});

window.addEventListener('resize', () => { resizeCanvas(); render(); });

/* ── フルスクリーン ── */
const btnFs = document.getElementById('btn-fs');
let fsIntended = false; // ユーザーが明示的にフルスクリーンをONにした意図を保持

function updateFsBtn() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  btnFs.textContent = isFs ? '✕' : '⛶';
  btnFs.title = isFs ? '全画面を終了' : 'フルスクリーン';
  btnFs.classList.toggle('active', isFs);
}
btnFs.addEventListener('click', () => {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  if (!isFs) {
    fsIntended = true;
    (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen)
      .call(document.documentElement);
  } else {
    fsIntended = false;
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
});
document.addEventListener('fullscreenchange', () => {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  // ユーザーがONにしたつもりなのに、ノートエリア操作などで意図せず解除された場合は再突入を試みる
  if (fsIntended && !isFs) {
    const req = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
    if (req) req.call(document.documentElement).catch(() => { fsIntended = false; });
  }
  updateFsBtn();
});
document.addEventListener('webkitfullscreenchange', updateFsBtn);

/* ── テーマ切替 ── */
const btnTheme = document.getElementById('btn-theme');
let isLight = (localStorage.getItem('calcpad-theme') ?? 'light') === 'light';
document.documentElement.classList.toggle('light', isLight);
function updateThemeBtn() {
  btnTheme.textContent = isLight ? '🌙' : '☀';
  btnTheme.title = isLight ? 'ダークモードへ' : 'ライトモードへ';
}
btnTheme.addEventListener('click', () => {
  isLight = !isLight;
  document.documentElement.classList.toggle('light', isLight);
  localStorage.setItem('calcpad-theme', isLight ? 'light' : 'dark');
  updateThemeBtn();
  render();
});
updateThemeBtn();

/* ── 行番号クリック／縦スワイプ ── */
let lnumSwipeStart = null;  // { lineNo, y }
let lnumSwiping    = false;
let lnumHighlight  = null;  // { from, to } 強調表示中の範囲

function insertAtCursor(text) {
  const s = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.substring(0, s) + text + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = s + text.length;
  ta.focus();
  prevLines = ta.value.split('\n');
  updateCursor();
  render();
}

/* ── テンキー ── */
const btnNumpad = document.getElementById('btn-numpad');
const numpad    = document.getElementById('numpad');
let numpadOpen  = false;

function setNumpadOpen(open) {
  numpadOpen = open;
  numpad.classList.toggle('open', open);
  btnNumpad.classList.toggle('active', open);
  if (open) {
    // ソフトウェアキーボードだけ抑制し、カーソル移動・選択は維持する
    ta.setAttribute('inputmode', 'none');
  } else {
    ta.removeAttribute('inputmode');
  }
  ta.focus();
}

btnNumpad.addEventListener('click', () => setNumpadOpen(!numpadOpen));

/* ── 表示形式切替ボタン ── */
const btnDispMode = document.getElementById('btn-dispmode');
const DISP_TITLES = { decimal:'小数（そのまま）', floor:'切り捨て', ceil:'切り上げ', round:'四捨五入' };
function updateDispModeBtn() {
  btnDispMode.textContent = DISP_LABELS[displayMode];
  btnDispMode.title = '表示形式: ' + DISP_TITLES[displayMode] + '（タップで切替）';
}
btnDispMode.addEventListener('click', () => {
  const idx = DISP_MODES.indexOf(displayMode);
  displayMode = DISP_MODES[(idx + 1) % DISP_MODES.length];
  localStorage.setItem('calcpad-dispmode', displayMode);
  updateDispModeBtn();
  render();
});
updateDispModeBtn();

function npApplyEdit(newValue, newCursorPos) {
  const oldLines = ta.value.split('\n');
  ta.value = newValue;
  ta.selectionStart = ta.selectionEnd = newCursorPos;
  const newLines = ta.value.split('\n');
  fixSRefs(oldLines, newLines);
  prevLines = ta.value.split('\n');
  ta.focus();
  updateCursor();
  render();
  scheduleSave();
}

numpad.addEventListener('click', e => {
  const btn = e.target.closest('.npkey');
  if (!btn) return;
  const k = btn.dataset.k;
  const s = ta.selectionStart, end = ta.selectionEnd;
  const v = ta.value;

  if (k === 'bs') {
    if (s !== end) { npApplyEdit(v.slice(0,s) + v.slice(end), s); }
    else if (s > 0) { npApplyEdit(v.slice(0,s-1) + v.slice(s), s-1); }
    return;
  }
  if (k === 'enter') {
    npApplyEdit(v.slice(0,s) + '\n' + v.slice(end), s+1);
    return;
  }
  npApplyEdit(v.slice(0,s) + k + v.slice(end), s + k.length);
});

function lnumLineFromEvent(e) {
  const el = e.target.closest('.lnum') ||
    document.elementFromPoint(e.touches ? e.touches[0].clientX : e.clientX,
                              e.touches ? e.touches[0].clientY : e.clientY)?.closest('.lnum');
  if (!el) return null;
  return parseInt(el.dataset.line);
}

// タッチ開始
lnums.addEventListener('touchstart', e => {
  const el = e.target.closest('.lnum');
  if (!el) return;
  const lineNo = parseInt(el.dataset.line);
  if (isNaN(lineNo)) return;
  lnumSwipeStart = { lineNo, y: e.touches[0].clientY };
  lnumSwiping    = false;
  lnumHighlight  = null;
  e.preventDefault();
}, { passive: false });

// タッチ移動 → スワイプ判定＆ハイライト更新
lnums.addEventListener('touchmove', e => {
  if (!lnumSwipeStart) return;
  const dy = Math.abs(e.touches[0].clientY - lnumSwipeStart.y);
  if (dy > 6) lnumSwiping = true;
  if (!lnumSwiping) return;
  e.preventDefault();

  const curY  = e.touches[0].clientY;
  const el    = document.elementFromPoint(e.touches[0].clientX, curY)?.closest('.lnum');
  const curNo = el ? parseInt(el.dataset.line) : lnumSwipeStart.lineNo;
  lnumHighlight = {
    from: Math.min(lnumSwipeStart.lineNo, curNo),
    to:   Math.max(lnumSwipeStart.lineNo, curNo),
  };
  // スワイプ中のハイライト描画
  document.querySelectorAll('.lnum').forEach(el => {
    const n = parseInt(el.dataset.line);
    if (n >= lnumHighlight.from && n <= lnumHighlight.to) {
      el.style.color      = 'var(--cyan)';
      el.style.background = 'rgba(57,208,216,0.15)';
    } else {
      el.style.color      = '';
      el.style.background = '';
    }
  });
}, { passive: false });

// タッチ終了 → 挿入
lnums.addEventListener('touchend', e => {
  if (!lnumSwipeStart) return;
  if (lnumSwiping && lnumHighlight) {
    // スワイプ → sum() 挿入
    insertAtCursor(`sum(S${lnumHighlight.from},S${lnumHighlight.to})`);
  } else {
    // タップ → S参照挿入（従来動作）
    insertAtCursor(`S${lnumSwipeStart.lineNo}`);
  }
  // ハイライトリセット
  document.querySelectorAll('.lnum').forEach(el => {
    el.style.color = ''; el.style.background = '';
  });
  lnumSwipeStart = null;
  lnumSwiping    = false;
  lnumHighlight  = null;
}, { passive: true });

// マウスクリック（PC）
lnums.addEventListener('click', e => {
  const el = e.target.closest('.lnum');
  if (!el) return;
  const lineNo = parseInt(el.dataset.line);
  if (isNaN(lineNo)) return;
  insertAtCursor(`S${lineNo}`);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  if (confirm('内容をすべて消去しますか？')) {
    ta.value = '';
    prevLines = [''];
    render();
    localStorage.setItem('calcpad-note', '');
  }
});

/* ── テキストファイル 保存／読み込み ── */
document.getElementById('btn-save').addEventListener('click', () => {
  const blob = new Blob([ta.value], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const ts   = new Date();
  const pad  = n => String(n).padStart(2,'0');
  const fname = `memo_calc_${ts.getFullYear()}${pad(ts.getMonth()+1)}${pad(ts.getDate())}_${pad(ts.getHours())}${pad(ts.getMinutes())}.txt`;
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

const fileLoadInput = document.getElementById('file-load');
document.getElementById('btn-load').addEventListener('click', () => {
  fileLoadInput.value = '';
  fileLoadInput.click();
});
fileLoadInput.addEventListener('change', () => {
  const file = fileLoadInput.files[0];
  if (!file) return;
  const apply = () => {
    const reader = new FileReader();
    reader.onload = () => {
      ta.value = reader.result;
      prevLines = ta.value.split('\n');
      render();
      localStorage.setItem('calcpad-note', ta.value);
    };
    reader.readAsText(file, 'UTF-8');
  };
  if (ta.value.trim() && !confirm('現在の内容を読み込んだファイルで置き換えますか？')) return;
  apply();
});

document.getElementById('btn-help').addEventListener('click', () => {
  document.getElementById('help-overlay').classList.add('open');
});
document.getElementById('help-close').addEventListener('click', () => {
  document.getElementById('help-overlay').classList.remove('open');
});
document.getElementById('help-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

applyResultsWidth();

/* ── PWA: manifest / icon / service worker をインライン生成 ── */
(function setupPWA() {
  const manifest = {
    name: 'memo_calc', short_name: 'memo_calc',
    start_url: './', scope: './', display: 'standalone',
    background_color: '#ffffff', theme_color: '#ffffff',
    icons: [
      { src: iconDataUrl(192), sizes: '192x192', type: 'image/png' },
      { src: iconDataUrl(512), sizes: '512x512', type: 'image/png' }
    ]
  };
  function iconDataUrl(size) {
    const c = document.createElement('canvas'); c.width = c.height = size;
    const g = c.getContext('2d');
    g.fillStyle = '#0969da'; g.fillRect(0,0,size,size);
    g.fillStyle = '#ffffff'; g.font = `bold ${size*0.5}px monospace`;
    g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText('Σ', size/2, size/2+size*0.05);
    return c.toDataURL('image/png');
  }
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
  document.getElementById('pwa-icon').href = iconDataUrl(192);
  document.getElementById('pwa-apple-icon').href = iconDataUrl(192);

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE = 'calcpad-v1';
      self.addEventListener('install', e => { self.skipWaiting(); });
      self.addEventListener('activate', e => { self.clients.claim(); });
      self.addEventListener('fetch', e => {
        e.respondWith(
          caches.match(e.request).then(cached => cached || fetch(e.request).then(res => {
            const copy = res.clone();
            caches.open(CACHE).then(c => c.put(e.request, copy));
            return res;
          }).catch(() => cached))
        );
      });
    `;
    const swBlob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
  }
})();
